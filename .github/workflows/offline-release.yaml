---
name: Release Plugin Distribution

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      target_tag:
        description: "Existing git tag to build and publish"
        required: true
        default: ""
        type: string

env:
  DEFAULT_PYTHON: "3.13"

permissions:
  contents: write

jobs:
  release-verify:
    name: Release Verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out plugin repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.target_tag || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}

      - name: Verify tag matches plugin manifest version
        shell: bash
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag_version="${{ inputs.target_tag }}"
            tag_version="${tag_version#v}"
          fi
          manifest_version="$(python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path("custom_plugins/racelink/manifest.json").read_text(encoding="utf-8"))
          print(manifest["version"])
          PY
          )"
          if [ "$tag_version" != "$manifest_version" ]; then
            echo "Tag version $tag_version does not match manifest version $manifest_version"
            exit 1
          fi

      - name: Verify generated online metadata
        run: python scripts/sync_racelink_host_dependency.py --check

      - name: Verify manifest dependency decision
        run: python scripts/verify_manifest_dependency_formats.py

      - name: Run RHFest validation
        uses: docker://ghcr.io/rotorhazard/rhfest-action:v3

  release-publish:
    name: Release Publish
    runs-on: ubuntu-latest
    needs: release-verify

    steps:
      - name: Check out plugin repository
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.target_tag || github.ref_name }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.DEFAULT_PYTHON }}

      - name: Read RaceLink_Host release metadata
        id: host_dependency
        run: |
          ref="$(python scripts/sync_racelink_host_dependency.py --print checkout-ref)"
          wheel="$(python scripts/sync_racelink_host_dependency.py --print host-wheel-filename)"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "wheel=${wheel}" >> "$GITHUB_OUTPUT"

      - name: Download RaceLink_Host release wheel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p external/RaceLink_Host
          gh release download "${{ steps.host_dependency.outputs.ref }}" \
            --repo "PSi86/RaceLink_Host" \
            --pattern "${{ steps.host_dependency.outputs.wheel }}" \
            --dir external/RaceLink_Host

      - name: Build offline bundle
        id: build_bundle
        shell: bash
        run: |
          release_tag="${GITHUB_REF_NAME}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            release_tag="${{ inputs.target_tag }}"
          fi
          python scripts/build_offline_release.py \
            --host-wheel "external/RaceLink_Host/${{ steps.host_dependency.outputs.wheel }}" \
            --output-dir dist \
            --release-tag "${release_tag}" | tee /tmp/offline_bundle_path.txt
          echo "zip_path=$(tail -n 1 /tmp/offline_bundle_path.txt)" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: racelink-rh-plugin-offline
          path: ${{ steps.build_bundle.outputs.zip_path }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.target_tag || github.ref_name }}
          generate_release_notes: true
          files: ${{ steps.build_bundle.outputs.zip_path }}
